<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Avisos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        color: white;
        font-family: Arial, sans-serif;
    }
    #mural-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: relative; /* Adicionado para basear os slides */
    }
    .slide {
        width: 100%;
        height: 100%;
        background-size: contain; /* Recomendo 'cover' para preencher a tela */
        background-position: center;
        background-repeat: no-repeat;
        position: absolute; /* Essencial para sobrepor os slides */
        top: 0;
        left: 0;
        opacity: 0; /* Começa invisível */
        transition: opacity 1.5s ease-in-out; /* Animação suave */
    }
    .slide.active {
        opacity: 1; /* Torna o slide ativo visível */
    }
    .slide-content {
        background-color: rgba(0, 0, 0, 0.5);
        padding: 20px;
        position: absolute;
        bottom: 10%;
        left: 5%;
        right: 5%;
        border-radius: 10px;
    }
    h1 {
        font-size: 3.5em;
    }
</style>
</head>

<body>
    <div id="mural-container">
        </div>

    <script type="module" src="mural.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
