<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Mural da Igreja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f8f9fa; }
        .container { max-width: 1200px; }
        #image-list img { width: 150px; height: 100px; object-fit: cover; cursor: pointer; border: 3px solid transparent; border-radius: 4px; }
        #image-list img.selected { border-color: #0d6efd; box-shadow: 0 0 8px rgba(13, 110, 253, 0.5); }
        #current-slides-list li { cursor: grab; background-color: #fff; }
        #current-slides-list li:active { cursor: grabbing; }
        .slide-item { display: flex; align-items: center; gap: 15px; }
        .slide-item img { width: 90px; height: 60px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container py-4">
        <div id="login-screen" class="card p-4 mx-auto" style="max-width: 400px;">
            <h1 class="text-center h3 mb-4">Login - Admin Mural</h1>
            <div class="mb-3"><label for="email" class="form-label">Email:</label><input type="email" id="email" class="form-control" placeholder="seu-email@exemplo.com"></div>
            <div class="mb-3"><label for="password" class="form-label">Senha:</label><input type="password" id="password" class="form-control"></div>
            <button id="login-button" class="btn btn-primary w-100">Entrar</button>
            <p id="login-error" class="text-danger mt-2"></p>
        </div>

        <div id="admin-panel" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2">ADM do Mural</h1>
                <button id="logout-button" class="btn btn-danger">Sair</button>
            </div>

            <div class="card mb-4">
                <div class="card-header"><h2 class="h5 mb-0">1. Criar Novo Aviso</h2></div>
                <div class="card-body">
                    <form id="announcement-form">
                        <div class="mb-3">
                            <label class="form-label">Selecione uma ou mais imagens do Google Drive (use Shift ou Ctrl):</label>
                            <div id="image-list" class="border p-2 rounded" style="display: flex; flex-wrap: wrap; gap: 10px; max-height: 400px; overflow-y: auto;">
                                Carregando imagens..
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="announcement-text" class="form-label">Texto do Aviso (será o mesmo para todas as fotos selecionadas):</label>
                            <textarea id="announcement-text" class="form-control" rows="2" placeholder="Opcional. Deixe em branco para exibir apenas a imagem."></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="announcement-order" class="form-label">Ordem de Início (sugestão automática):</label>
                                <input type="number" id="announcement-order" class="form-control" value="1" min="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Duração de cada slide:</label>
                                <input type="text" class="form-control" value="5 segundos (fixo)" disabled readonly>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Salvar Aviso(s) no Mural</button>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><h2 class="h5 mb-0">2. Avisos Atuais (Arraste para reordenar)</h2></div>
                <div class="card-body">
                    <ul id="current-slides-list" class="list-group">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script type="module" src="admin.js"></script>

</body>
</html>
